<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Global Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

/* TOP BAR */
#topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #151515;
  align-items: center;
}

#left {
  display: flex;
  gap: 8px;
  align-items: center;
}

#nameInput {
  background: #222;
  border: none;
  color: white;
  padding: 6px;
  border-radius: 6px;
}

/* CHAT */
#chat {
  height: calc(100vh - 140px);
  overflow-y: auto;
  padding: 14px;
}

/* MESSAGE */
.msg {
  display: flex;
  gap: 12px;
  margin-bottom: 14px;
  align-items: flex-start;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
}

.bubble {
  background: #1c1c1c;
  padding: 10px;
  border-radius: 10px;
  max-width: 600px;
  min-width: 200px;
}

.name {
  font-size: 12px;
  color: #888;
  margin-bottom: 4px;
}

.time {
  color: #666;
  font-size: 11px;
  font-weight: normal;
  margin-left: 5px;
}

/* REACTIONS (FIXED LEFT ALIGN) */
.reactions {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  justify-content: flex-start;
  align-items: center;
}

/* reaction pill */
.react {
  background: #2a2a2a;
  padding: 4px 8px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
}

/* plus button */
.plus {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #2a2a2a;
  border: none;
  color: white;
  cursor: pointer;
}

/* INPUT */
#inputBar {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: #151515;
}

#msg {
  flex: 1;
  padding: 12px;
  border: none;
  background: #222;
  color: white;
}

/* PICKER */
#picker {
  position: fixed;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);
  background: #1c1c1c;
  padding: 10px;
  border-radius: 10px;
  display: none;
  gap: 10px;
  z-index: 9999;
}

.emoji {
  font-size: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="topbar">
  <div id="left">
    <input id="nameInput" placeholder="username">
    <button onclick="saveName()">Save</button>
  </div>
</div>

<div id="chat"></div>
<div id="picker"></div>

<div id="inputBar">
  <input id="msg" placeholder="message (88 max)">
  <button onclick="send()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onValue,
  update,
  get,
  set,
  onDisconnect
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBAc10pK2GOre4di3zwLuXePMS1bA3-GBU",
  authDomain: "novara-global.firebaseapp.com",
  projectId: "novara-global",
  databaseURL: "https://novara-global-default-rtdb.firebaseio.com/",
  storageBucket: "novara-global.firebasestorage.app",
  messagingSenderId: "525223468995",
  appId: "1:525223468995:web:8c1cc1ba4803928168e776"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messagesRef = ref(db, "messages");
const onlineRef = ref(db, "online");

const avatars = ["cat","crow","elephant","dog","dog2","panda"];
const REACTIONS = ["❤️","😂","😭","💀","🥀","🤡"];

const order = REACTIONS;
const myId = Math.random().toString(36).slice(2);

/* USER */
let username = localStorage.getItem("username") || ("Guest" + Math.floor(Math.random()*9999));
localStorage.setItem("username", username);

let avatar = localStorage.getItem("avatar") || avatars[Math.floor(Math.random()*avatars.length)];
localStorage.setItem("avatar", avatar);

/* ONLINE */
const meRef = ref(db, "online/" + myId);

function heartbeat() {
  set(meRef, {
    name: username,
    t: Date.now()
  });
}

heartbeat();
setInterval(heartbeat, 15000);
onDisconnect(meRef).remove();

/* ONLINE COUNT */
onValue(onlineRef, (snap) => {
  const data = snap.val() || {};
  const count = Object.keys(data).length;

  let el = document.getElementById("onlineCount");
  if (!el) {
    el = document.createElement("div");
    el.id = "onlineCount";
    el.style.color = "#888";
    document.getElementById("topbar").appendChild(el);
  }

  el.innerText = "Online: " + count;
});

/* INIT */
window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("nameInput").value = username;
});

/* SAVE NAME */
window.saveName = function () {
  const v = document.getElementById("nameInput").value.trim();
  if (!v) return;
  username = v.slice(0, 20);
  localStorage.setItem("username", username);
  heartbeat();
};

/* SEND */
window.send = function () {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text || text.length > 88) return;

  const now = new Date();

const timeString = now.toLocaleTimeString([], {
  hour: "2-digit",
  minute: "2-digit",
  hour12: false
});

push(messagesRef, {
  text,
  name: username,
  avatar,
  time: Date.now(),
  timestamp: timeString,
  reactions: {}
});

input.value = "";
};

document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

/* RENDER */
onValue(messagesRef, (snap) => {
  const data = snap.val() || {};
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  Object.entries(data).forEach(([id, msg]) => {
    if (!msg) return;

    const reactions = msg.reactions || {};

    let reactionHTML = "";

    order.forEach(r => {
      if (reactions[r]) {
        reactionHTML += `
          <div class="react" onclick="toggle('${id}','${r}')">
            ${r} ${reactions[r].length}
          </div>
        `;
      }
    });

    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
      <img class="avatar" src="assets/${msg.avatar || "cat"}.png">

      <div>
        <div class="bubble">
          <div class="name">
            ${msg.name || "Unknown"}
                <span class="time">
                  ${msg.timestamp || new Date(msg.time).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}
                </span>
            </div>
          <div>${msg.text || ""}</div>
        </div>

        <div class="reactions">
          ${reactionHTML}
          <button class="plus" onclick="openPicker(event,'${id}')">+</button>
        </div>
      </div>
    `;

    chat.appendChild(div);
  });
});

/* TOGGLE */
window.toggle = async function(id, emoji) {
  const r = ref(db, "messages/" + id);
  const s = await get(r);
  let d = s.val();

  if (!d) return;
  if (!d.reactions) d.reactions = {};

  let arr = d.reactions[emoji] || [];

  if (arr.includes(myId)) {
    arr = arr.filter(x => x !== myId);
  } else {
    arr.push(myId);
  }

  if (arr.length === 0) delete d.reactions[emoji];
  else d.reactions[emoji] = arr;

  update(r, { reactions: d.reactions });
};

/* PICKER */
const picker = document.getElementById("picker");
let currentMsg = null;

window.openPicker = function (e, id) {
  e.stopPropagation();
  currentMsg = id;

  picker.style.display = "flex";
  picker.innerHTML = "";

  REACTIONS.forEach(r => {
    const s = document.createElement("span");
    s.className = "emoji";
    s.innerText = r;
    s.onclick = () => {
      picker.style.display = "none";
      toggle(currentMsg, r);
    };
    picker.appendChild(s);
  });
};

document.addEventListener("click", (e) => {
  if (!picker.contains(e.target)) picker.style.display = "none";
});
</script>

</body>
</html>

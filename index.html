<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onChildAdded,
  get,
  update,
  remove
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

/* ---------------- FIREBASE ---------------- */

const firebaseConfig = {
  apiKey: "AIzaSyBAc10pK2GOre4di3zwLuXePMS1bA3-GBU",
  authDomain: "novara-global.firebaseapp.com",
  projectId: "novara-global",
  databaseURL: "https://novara-global-default-rtdb.firebaseio.com/",
  storageBucket: "novara-global.firebasestorage.app",
  messagingSenderId: "525223468995",
  appId: "1:525223468995:web:8c1cc1ba4803928168e776"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const messagesRef = ref(db, "messages");

/* ---------------- USER STATE ---------------- */

const myId = Math.random().toString(36).slice(2);

let username = localStorage.getItem("username");
let avatar = localStorage.getItem("avatar");
let isAdmin = localStorage.getItem("isAdmin") === "true";

const ADMIN_CODE = "1974321471";

const avatars = ["cat", "crow", "elephant", "dog", "dog2", "panda"];
const REACTIONS = ["❤️", "😂", "😭", "💀", "🥀", "🤡"];

/* ---------------- INIT USER ---------------- */

if (!username) {
  username = "Guest" + Math.floor(Math.random() * 9999);
  localStorage.setItem("username", username);
}

if (!avatar) {
  avatar = avatars[Math.floor(Math.random() * avatars.length)];
  localStorage.setItem("avatar", avatar);
}

document.getElementById("nameInput").value = username;

/* ---------------- ADMIN CHECK ---------------- */

function checkAdminCode(code) {
  if (code !== ADMIN_CODE) return;

  isAdmin = true;
  localStorage.setItem("isAdmin", "true");

  const newName = prompt("Admin unlocked. Set display name:");
  if (newName && newName.trim()) {
    username = newName.trim().slice(0, 20);
    localStorage.setItem("username", username);
    document.getElementById("nameInput").value = username;
  }

  alert("Admin mode enabled");
}

window.saveName = function () {
  let v = document.getElementById("nameInput").value.trim();
  if (!v) return;

  checkAdminCode(v);

  if (v === ADMIN_CODE) return;

  username = v.slice(0, 20);
  localStorage.setItem("username", username);
};

/* ---------------- SEND MESSAGE ---------------- */

function send() {
  let text = document.getElementById("msg").value.trim();
  if (!text || text.length > 88) return;

  push(messagesRef, {
    text,
    name: username,
    avatar,
    time: Date.now(),
    reactions: {}
  });

  document.getElementById("msg").value = "";
}

window.send = send;

document.getElementById("msg").addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

/* ---------------- MESSAGE RENDER ---------------- */

onChildAdded(messagesRef, (snap) => {
  const msg = snap.val();
  const id = snap.key;

  const div = document.createElement("div");
  div.className = "msg";

  const reactions = msg.reactions || {};

  let reactionHTML = "";

  for (let emoji in reactions) {
    const users = Array.isArray(reactions[emoji]) ? reactions[emoji] : [];
    const active = users.includes(myId);

    reactionHTML += `
      <div class="react ${active ? "active" : ""}"
           onclick="toggle('${id}', '${emoji}')">
        ${emoji} ${users.length}
      </div>
    `;
  }

  reactionHTML += `
    <button class="plus" onclick="openPicker(event,'${id}')">+</button>
  `;

  div.innerHTML = `
    <img class="avatar" src="assets/${msg.avatar}.png">

    <div style="width:100%">
      <div class="bubble">
        <div class="name">${msg.name}</div>
        <div>${msg.text}</div>
      </div>

      <div class="reactions">
        ${reactionHTML}

        ${
          isAdmin
            ? `<button onclick="deleteMessage('${id}')"
                style="
                  margin-left:8px;
                  background:#5a1f1f;
                  border:none;
                  color:white;
                  border-radius:6px;
                  padding:4px 8px;
                  cursor:pointer;
                ">
                delete
              </button>`
            : ""
        }
      </div>
    </div>
  `;

  document.getElementById("chat").appendChild(div);
});

/* ---------------- REACTIONS (SAFE + FIXED) ---------------- */

window.toggle = async function (id, emoji) {
  const r = ref(db, "messages/" + id);
  const s = await get(r);

  if (!s.exists()) return;

  const d = s.val();
  let reactions = d.reactions || {};

  let arr = Array.isArray(reactions[emoji]) ? reactions[emoji] : [];

  if (arr.includes(myId)) {
    arr = arr.filter((x) => x !== myId);
  } else {
    const active = Object.keys(reactions).filter(
      (k) => Array.isArray(reactions[k]) && reactions[k].length > 0
    );

    if (!active.includes(emoji) && active.length >= 3) return;

    arr.push(myId);
  }

  if (arr.length === 0) delete reactions[emoji];
  else reactions[emoji] = arr;

  await update(r, { reactions });
};

/* ---------------- PICKER ---------------- */

const picker = document.getElementById("picker");
let currentMsg = null;

window.openPicker = function (e, id) {
  e.stopPropagation();

  currentMsg = id;
  picker.style.display = "flex";
  picker.innerHTML = "";

  REACTIONS.forEach((r) => {
    const s = document.createElement("span");
    s.className = "emoji";
    s.innerText = r;

    s.onclick = () => addReaction(r);

    picker.appendChild(s);
  });
};

window.addReaction = function (emoji) {
  picker.style.display = "none";
  toggle(currentMsg, emoji);
};

/* close picker */
document.addEventListener("click", (e) => {
  if (!picker.contains(e.target)) {
    picker.style.display = "none";
  }
});

/* ---------------- DELETE MESSAGE (ADMIN ONLY) ---------------- */

window.deleteMessage = async function (id) {
  if (!isAdmin) return;

  await remove(ref(db, "messages/" + id));
};
</script>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Global Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

/* TOP */
#topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #151515;
  align-items: center;
}

#left {
  display: flex;
  gap: 8px;
  align-items: center;
}

#nameInput {
  background: #222;
  border: none;
  color: white;
  padding: 6px;
  border-radius: 6px;
}

/* CHAT */
#chat {
  height: calc(100vh - 140px);
  overflow-y: auto;
  padding: 14px;
}

/* MESSAGE ROW (FIX WIDTH + SPACING ISSUE) */
.msg {
  display: flex;
  gap: 12px;
  margin-bottom: 14px;
  align-items: flex-start;
  max-width: 900px;
}

/* AVATAR */
.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}

/* BUBBLE (WIDER / LESS "SKINNY") */
.bubble {
  background: #1c1c1c;
  padding: 10px;
  border-radius: 10px;
  min-width: 200px;
  max-width: 600px;
}

.name {
  font-size: 12px;
  color: #888;
  margin-bottom: 4px;
}

/* REACTIONS (IMPORTANT: OUTSIDE BUBBLE VISUALLY) */
.reactions {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  margin-left: 48px; /* pushes under bubble area */
  flex-wrap: wrap;
  align-items: center;
}

.react {
  background: #2a2a2a;
  padding: 4px 8px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
}

.react.active {
  background: #1f3b66;
}

.plus {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #2a2a2a;
  border: none;
  color: white;
  cursor: pointer;
}

/* INPUT */
#inputBar {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: #151515;
}

#msg {
  flex: 1;
  padding: 12px;
  border: none;
  background: #222;
  color: white;
}

/* PICKER (FIXED BEHAVIOR) */
#picker {
  position: fixed;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);
  background: #1c1c1c;
  padding: 10px;
  border-radius: 10px;
  display: none;
  gap: 10px;
  z-index: 9999;
}

.emoji {
  font-size: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="topbar">
  <div id="left">
    <input id="nameInput">
    <button onclick="saveName()">Save</button>
  </div>
</div>

<div id="chat"></div>
<div id="picker"></div>

<div id="inputBar">
  <input id="msg" placeholder="message (88 max)">
  <button onclick="send()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onChildAdded,
  onValue,
  set,
  update,
  get
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAc10pK2GOre4di3zwLuXePMS1bA3-GBU",
  authDomain: "novara-global.firebaseapp.com",
  projectId: "novara-global",
  databaseURL: "https://novara-global-default-rtdb.firebaseio.com/",
  storageBucket: "novara-global.firebasestorage.app",
  messagingSenderId: "525223468995",
  appId: "1:525223468995:web:8c1cc1ba4803928168e776"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messagesRef = ref(db,"messages");

const avatars=["cat","crow","elephant","dog","dog2","panda"];
const REACTIONS=["❤️","😂","😭","💀","🥀","🤡"];

let username=localStorage.getItem("username");
let avatar=localStorage.getItem("avatar");

if(!username){
  username="Guest"+Math.floor(Math.random()*9999);
  localStorage.setItem("username",username);
}

if(!avatar){
  avatar=avatars[Math.floor(Math.random()*avatars.length)];
  localStorage.setItem("avatar",avatar);
}

document.getElementById("nameInput").value=username;

window.saveName=function(){
  let v=document.getElementById("nameInput").value.trim();
  if(!v)return;
  username=v.slice(0,20);
  localStorage.setItem("username",username);
};

function send(){
  let text=document.getElementById("msg").value.trim();
  if(!text||text.length>88)return;

  push(messagesRef,{
    text,
    name:username,
    avatar,
    time:Date.now(),
    reactions:{}
  });

  document.getElementById("msg").value="";
}

window.send=send;

document.getElementById("msg").addEventListener("keydown",(e)=>{
  if(e.key==="Enter")send();
});

/* MESSAGES */
onChildAdded(messagesRef,(snap)=>{
  const msg=snap.val();
  const id=snap.key;

  const div=document.createElement("div");
  div.className="msg";

  const reactions=msg.reactions||{};

  let reactionHTML="";

  for(let e in reactions){
    const users=reactions[e];
    const active=users.includes(myId);

    reactionHTML+=`
      <div class="react ${active?'active':''}"
      onclick="toggle('${id}','${e}')">
      ${e} ${users.length}
      </div>
    `;
  }

  reactionHTML+=`<button class="plus" onclick="openPicker(event,'${id}')">+</button>`;

  div.innerHTML=`
    <img class="avatar" src="assets/${msg.avatar}.png">
    <div>
      <div class="bubble">
        <div class="name">${msg.name}</div>
        <div>${msg.text}</div>
      </div>

      <div class="reactions">
        ${reactionHTML}
      </div>
    </div>
  `;

  document.getElementById("chat").appendChild(div);
});

/* REACTIONS */
const myId=Math.random().toString(36).slice(2);

window.toggle=async function(id,emoji){
  const r=ref(db,"messages/"+id);
  const s=await get(r);
  let d=s.val();

  if(!d.reactions)d.reactions={};

  let arr=d.reactions[emoji]||[];

  if(arr.includes(myId)){
    arr=arr.filter(x=>x!==myId);
  } else {
    let active=Object.keys(d.reactions).filter(k=>d.reactions[k].length>0);
    if(!active.includes(emoji)&&active.length>=3)return;
    arr.push(myId);
  }

  if(arr.length===0)delete d.reactions[emoji];
  else d.reactions[emoji]=arr;

  update(r,{reactions:d.reactions});
};

/* PICKER FIXED */
const picker=document.getElementById("picker");
let currentMsg=null;

window.openPicker=function(e,id){
  e.stopPropagation();
  currentMsg=id;

  picker.style.display="flex";
  picker.innerHTML="";

  REACTIONS.forEach(r=>{
    let s=document.createElement("span");
    s.className="emoji";
    s.innerText=r;
    s.onclick=()=>add(r);
    picker.appendChild(s);
  });
};

window.add=function(e){
  picker.style.display="none";
  toggle(currentMsg,e);
};

/* CLOSE ONLY WHEN CLICKING OUTSIDE */
document.addEventListener("click",(e)=>{
  if(!picker.contains(e.target)){
    picker.style.display="none";
  }
});
</script>

</body>
</html>

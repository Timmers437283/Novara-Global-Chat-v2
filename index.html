<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onChildAdded,
  update,
  get
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAc10pK2GOre4di3zwLuXePMS1bA3-GBU",
  authDomain: "novara-global.firebaseapp.com",
  projectId: "novara-global",
  databaseURL: "https://novara-global-default-rtdb.firebaseio.com/",
  storageBucket: "novara-global.firebasestorage.app",
  messagingSenderId: "525223468995",
  appId: "1:525223468995:web:8c1cc1ba4803928168e776"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const messagesRef = ref(db, "messages");

const avatars = ["cat","crow","elephant","dog","dog2","panda"];
const REACTIONS = ["❤️","😂","😭","💀","🥀","🤡"];

const myId = Math.random().toString(36).slice(2); // FIX: defined early

let username = localStorage.getItem("username");
let avatar = localStorage.getItem("avatar");

if (!username) {
  username = "Guest" + Math.floor(Math.random()*9999);
  localStorage.setItem("username", username);
}

if (!avatar) {
  avatar = avatars[Math.floor(Math.random()*avatars.length)];
  localStorage.setItem("avatar", avatar);
}

document.getElementById("nameInput").value = username;

window.saveName = function () {
  let v = document.getElementById("nameInput").value.trim();
  if (!v) return;

  username = v.slice(0, 20);
  localStorage.setItem("username", username);
};

window.send = function () {
  let text = document.getElementById("msg").value.trim();
  if (!text || text.length > 88) return;

  push(messagesRef, {
    text,
    name: username,
    avatar,
    time: Date.now(),
    reactions: {}
  });

  document.getElementById("msg").value = "";
};

document.getElementById("msg").addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

/* RENDER */
onChildAdded(messagesRef, (snap) => {
  const msg = snap.val();
  const id = snap.key;

  const reactions = msg.reactions || {};

  let reactionHTML = "";

  for (let e in reactions) {
    const users = reactions[e] || [];
    const active = users.includes(myId);

    reactionHTML += `
      <div class="react ${active ? "active" : ""}"
      onclick="toggle('${id}','${e}')">
        ${e} ${users.length}
      </div>
    `;
  }

  const div = document.createElement("div");
  div.className = "msg";

  div.innerHTML = `
    <img class="avatar" src="assets/${msg.avatar}.png">

    <div>
      <div class="bubble">
        <div class="name">${msg.name}</div>
        <div>${msg.text}</div>
      </div>

      <div class="reactions">
        ${reactionHTML}
        <button class="plus" onclick="openPicker(event,'${id}')">+</button>
      </div>
    </div>
  `;

  document.getElementById("chat").appendChild(div);
});

/* REACTIONS (NO dynamic import) */
window.toggle = async function(id, emoji) {
  const r = ref(db, "messages/" + id);
  const s = await get(r);
  let d = s.val();

  if (!d.reactions) d.reactions = {};

  let arr = d.reactions[emoji] || [];

  if (arr.includes(myId)) {
    arr = arr.filter(x => x !== myId);
  } else {
    arr.push(myId);
  }

  if (arr.length === 0) delete d.reactions[emoji];
  else d.reactions[emoji] = arr;

  update(r, { reactions: d.reactions });
};

/* PICKER */
const picker = document.getElementById("picker");
let currentMsg = null;

window.openPicker = function (e, id) {
  e.stopPropagation();
  currentMsg = id;

  picker.style.display = "flex";
  picker.innerHTML = "";

  REACTIONS.forEach(r => {
    const s = document.createElement("span");
    s.className = "emoji";
    s.innerText = r;
    s.onclick = () => addReaction(r);
    picker.appendChild(s);
  });
};

window.addReaction = function (emoji) {
  picker.style.display = "none";
  toggle(currentMsg, emoji);
};

document.addEventListener("click", (e) => {
  if (!picker.contains(e.target)) {
    picker.style.display = "none";
  }
});
</script>

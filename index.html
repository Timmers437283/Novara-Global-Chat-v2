<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Global Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
    }

    #topbar {
      padding: 10px;
      background: #151515;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    #leftTop {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #nameInput {
      background: #222;
      border: none;
      padding: 8px;
      color: white;
      outline: none;
      border-radius: 6px;
    }

    #onlineCount {
      font-size: 14px;
      color: #aaa;
    }

    #typing {
      padding: 5px 10px;
      font-size: 12px;
      color: #888;
      height: 18px;
    }

    #chat {
      height: calc(100vh - 140px);
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      align-items: flex-start;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }

    .bubble {
      background: #1c1c1c;
      padding: 8px;
      border-radius: 8px;
      max-width: 70%;
    }

    .name {
      font-size: 12px;
      color: #888;
      margin-bottom: 3px;
    }

    #inputBar {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      background: #151515;
    }

    #msg {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
      background: #222;
      color: white;
    }

    button {
      width: 100px;
      border: none;
      background: #2b6cff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1f55cc;
    }
  </style>
</head>

<body>

<div id="topbar">
  <div id="leftTop">
    <input id="nameInput" placeholder="Username">
    <button onclick="saveName()">Save</button>
  </div>

  <div id="onlineCount">Online: 0</div>
</div>

<div id="typing"></div>
<div id="chat"></div>

<div id="inputBar">
  <input id="msg" placeholder="Type message... (88 max)">
  <button onclick="send()">Send</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import {
    getDatabase,
    ref,
    push,
    onChildAdded,
    onValue,
    set,
    remove,
    child
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBAc10pK2GOre4di3zwLuXePMS1bA3-GBU",
    authDomain: "novara-global.firebaseapp.com",
    projectId: "novara-global",
    databaseURL: "https://novara-global-default-rtdb.firebaseio.com/",
    storageBucket: "novara-global.firebasestorage.app",
    messagingSenderId: "525223468995",
    appId: "1:525223468995:web:8c1cc1ba4803928168e776"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const messagesRef = ref(db, "messages");
  const presenceRef = ref(db, "presence");
  const typingRef = ref(db, "typing");

  const avatars = ["cat", "crow", "elephant", "dog", "dog2", "panda"];

  const CLEANUP_TIME = 12 * 60 * 60 * 1000;

  // USER DATA
  let username = localStorage.getItem("username");
  let avatar = localStorage.getItem("avatar");

  if (!username) {
    username = "Guest" + Math.floor(Math.random() * 9999);
    localStorage.setItem("username", username);
  }

  if (!avatar) {
    avatar = avatars[Math.floor(Math.random() * avatars.length)];
    localStorage.setItem("avatar", avatar);
  }

  document.getElementById("nameInput").value = username;

  window.saveName = function () {
    const v = document.getElementById("nameInput").value.trim();
    if (!v) return;

    username = v.slice(0, 20);
    localStorage.setItem("username", username);
  };

  // SEND MESSAGE
  function send() {
    const input = document.getElementById("msg");
    let text = input.value.trim();

    if (!text) return;
    if (text.length > 88) return;

    push(messagesRef, {
      text,
      name: username,
      avatar,
      time: Date.now()
    });

    input.value = "";
  }

  window.send = send;

  document.getElementById("msg").addEventListener("keydown", (e) => {
    if (e.key === "Enter") send();
  });

  // DISPLAY MESSAGES
  onChildAdded(messagesRef, (data) => {
    const msg = data.val();

    // cleanup old messages (client-side only)
    if (msg.time && Date.now() - msg.time > CLEANUP_TIME) return;

    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
      <img class="avatar" src="assets/${msg.avatar}.png">
      <div class="bubble">
        <div class="name">${msg.name}</div>
        <div>${msg.text}</div>
      </div>
    `;

    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = 999999;
  });

  // ONLINE SYSTEM (basic heartbeat)
  const myId = Math.random().toString(36).slice(2);

  setInterval(() => {
    set(ref(db, "presence/" + myId), {
      time: Date.now()
    });
  }, 5000);

  onValue(presenceRef, (snap) => {
    let count = 0;
    const now = Date.now();

    snap.forEach((u) => {
      if (now - u.val().time < 15000) count++;
    });

    document.getElementById("onlineCount").innerText =
      "Online: " + count;
  });

  // TYPING INDICATOR
  document.getElementById("msg").addEventListener("input", () => {
    set(ref(db, "typing/" + myId), {
      name: username,
      time: Date.now()
    });
  });

  onValue(typingRef, (snap) => {
    const now = Date.now();
    let names = [];

    snap.forEach((u) => {
      const v = u.val();
      if (now - v.time < 3000) names.push(v.name);
    });

    document.getElementById("typing").innerText =
      names.length ? names.join(", ") + " is typing..." : "";
  });

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Global Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

/* TOP BAR */
#topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #151515;
  align-items: center;
}

#left {
  display: flex;
  gap: 8px;
  align-items: center;
}

#right {
  display: flex;
  gap: 8px;
  align-items: center;
  position: relative;
}

/* SETTINGS BUBBLE BUTTON */
.bubble-btn {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: #2a2a2a;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}

.bubble-btn img {
  width: 20px;
  height: 20px;
}

.bubble-btn:hover {
  background: #333;
}

/* SETTINGS PANEL */
#settingsPanel {
  position: absolute;
  top: 44px;
  right: 0;
  width: 230px;
  background: #1c1c1c;
  border-radius: 12px;
  padding: 14px;
  display: none;
  flex-direction: column;
  gap: 12px;
  z-index: 10000;
  box-shadow: 0 6px 20px rgba(0,0,0,0.5);
}

#settingsPanel.open {
  display: flex;
}

.settings-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.settings-row .avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
}

#avatarNameBtn {
  flex: 1;
  background: #2a2a2a;
  border: none;
  color: white;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  text-align: left;
  font-size: 13px;
}

#avatarNameBtn:hover {
  background: #333;
}

/* AVATAR LIST */
#avatarList {
  display: none;
  flex-direction: column;
  gap: 4px;
  max-height: 220px;
  overflow-y: auto;
}

#avatarList.open {
  display: flex;
}

.avatar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px;
  border-radius: 8px;
  cursor: pointer;
}

.avatar-item:hover {
  background: #2a2a2a;
}

.avatar-item img {
  width: 28px;
  height: 28px;
  border-radius: 50%;
}

.avatar-item span {
  font-size: 13px;
}

/* NAME CHANGE (moved into settings) */
.settings-name {
  display: flex;
  gap: 8px;
  border-top: 1px solid #2a2a2a;
  padding-top: 12px;
}

#nameInput {
  flex: 1;
  background: #222;
  border: none;
  color: white;
  padding: 6px;
  border-radius: 6px;
}

#settingsPanel button {
  background: #2a2a2a;
  border: none;
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}

#settingsPanel button:hover {
  background: #333;
}

/* CHAT */
#chat {
  height: calc(100vh - 140px);
  overflow-y: auto;
  padding: 14px;
}

/* MESSAGE */
.msg {
  display: flex;
  gap: 12px;
  margin-bottom: 14px;
  align-items: flex-start;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
}

.bubble {
  background: #1c1c1c;
  padding: 10px;
  border-radius: 10px;
  max-width: 600px;
  min-width: 200px;
}

.name {
  font-size: 12px;
  color: #888;
  margin-bottom: 4px;
}

.time {
  color: #666;
  font-size: 11px;
  font-weight: normal;
  margin-left: 5px;
}

/* REACTIONS (FIXED LEFT ALIGN) */
.reactions {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  justify-content: flex-start;
  align-items: center;
}

/* reaction pill */
.react {
  background: #2a2a2a;
  padding: 4px 8px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
}

/* plus button */
.plus {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #2a2a2a;
  border: none;
  color: white;
  cursor: pointer;
}

/* INPUT */
#inputBar {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: #151515;
}

#msg {
  flex: 1;
  padding: 12px;
  border: none;
  background: #222;
  color: white;
}

/* PICKER */
#picker {
  position: fixed;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);
  background: #1c1c1c;
  padding: 10px;
  border-radius: 10px;
  display: none;
  gap: 10px;
  z-index: 9999;
}

.emoji {
  font-size: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="topbar">
  <div id="left"></div>

  <div id="right">
    <button id="settingsBtn" class="bubble-btn">
      <img src="assets/settings.png">
    </button>

    <div id="settingsPanel">
      <div class="settings-row">
        <img id="settingsAvatar" class="avatar" src="assets/Cat.png">
        <button id="avatarNameBtn">Cat</button>
      </div>

      <div id="avatarList"></div>

      <div class="settings-name">
        <input id="nameInput" placeholder="username">
        <button onclick="saveName()">Save</button>
      </div>
    </div>
  </div>
</div>

<div id="chat"></div>
<div id="picker"></div>

<div id="inputBar">
  <input id="msg" placeholder="message (88 max)">
  <button onclick="send()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onValue,
  update,
  get,
  set,
  onDisconnect
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBAc10pK2GOre4di3zwLuXePMS1bA3-GBU",
  authDomain: "novara-global.firebaseapp.com",
  projectId: "novara-global",
  databaseURL: "https://novara-global-default-rtdb.firebaseio.com/",
  storageBucket: "novara-global.firebasestorage.app",
  messagingSenderId: "525223468995",
  appId: "1:525223468995:web:8c1cc1ba4803928168e776"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messagesRef = ref(db, "messages");
const onlineRef = ref(db, "online");

const avatars = ["Cat","Crow","Elephant","Frenchie","Beagle","Panda","Monkey","Hippo"];
const REACTIONS = ["❤️","😂","😭","💀","🥀","🤡","👍","👎"];

const order = REACTIONS;
const myId = Math.random().toString(36).slice(2);

/* USER */
let username = localStorage.getItem("username") || ("Guest" + Math.floor(Math.random()*9999));
localStorage.setItem("username", username);

let avatar = localStorage.getItem("avatar") || avatars[Math.floor(Math.random()*avatars.length)];
localStorage.setItem("avatar", avatar);

/* ONLINE */
const meRef = ref(db, "online/" + myId);

function heartbeat() {
  set(meRef, {
    name: username,
    t: Date.now()
  });
}

heartbeat();
setInterval(heartbeat, 15000);
onDisconnect(meRef).remove();

/* ONLINE COUNT */
onValue(onlineRef, (snap) => {
  const data = snap.val() || {};
  const count = Object.keys(data).length;

  let el = document.getElementById("onlineCount");
  if (!el) {
    el = document.createElement("div");
    el.id = "onlineCount";
    el.style.color = "#888";
    document.getElementById("left").appendChild(el);
  }

  el.innerText = "Online: " + count;
});

/* HELPERS */
function label(name) {
  return name.charAt(0).toUpperCase() + name.slice(1);
}

function refreshSettingsAvatar() {
  document.getElementById("settingsAvatar").src = `assets/${avatar}.png`;
  document.getElementById("avatarNameBtn").innerText = label(avatar);
}

/* INIT */
window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("nameInput").value = username;
  refreshSettingsAvatar();
  buildAvatarList();
});

/* SAVE NAME */
window.saveName = function () {
  const v = document.getElementById("nameInput").value.trim();
  if (!v) return;
  username = v.slice(0, 20);
  localStorage.setItem("username", username);
  heartbeat();
};

/* AVATAR LIST */
function buildAvatarList() {
  const list = document.getElementById("avatarList");
  list.innerHTML = "";

  avatars.forEach(a => {
    const item = document.createElement("div");
    item.className = "avatar-item";
    item.innerHTML = `
      <img src="assets/${a}.png">
      <span>${label(a)}</span>
    `;
    item.onclick = (e) => {
      e.stopPropagation();
      avatar = a;
      localStorage.setItem("avatar", avatar);
      heartbeat();
      refreshSettingsAvatar();
      list.classList.remove("open");
    };
    list.appendChild(item);
  });
}

/*
  FORMAT TIME
  Formats a stored epoch (msg.time) into the VIEWER's own local time,
  rather than baking in the sender's local time at send-time.
  Shows just HH:MM for messages sent today, and adds a date prefix
  ("Jul 2") for anything sent on a previous day.
*/
function formatTime(epochMs) {
  const d = new Date(epochMs);
  const now = new Date();

  const timeStr = d.toLocaleTimeString([], {
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  });

  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) return timeStr;

  const dateStr = d.toLocaleDateString([], {
    month: "short",
    day: "numeric"
  });

  return `${dateStr} ${timeStr}`;
}

/* SEND */
window.send = function () {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text || text.length > 88) return;

  push(messagesRef, {
    text,
    name: username,
    avatar,
    time: Date.now(),
    reactions: {}
  });

  input.value = "";
};

document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

/* RENDER */
onValue(messagesRef, (snap) => {
  const data = snap.val() || {};
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  Object.entries(data).forEach(([id, msg]) => {
    if (!msg) return;

    const reactions = msg.reactions || {};

    let reactionHTML = "";

    order.forEach(r => {
      if (reactions[r]) {
        reactionHTML += `
          <div class="react" onclick="toggle('${id}','${r}')">
            ${r} ${reactions[r].length}
          </div>
        `;
      }
    });

    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
      <img class="avatar" src="assets/${msg.avatar || "cat"}.png">

      <div>
        <div class="bubble">
          <div class="name">
            ${msg.name || "Unknown"}
                <span class="time">
                  ${formatTime(msg.time)}
                </span>
            </div>
          <div>${msg.text || ""}</div>
        </div>

        <div class="reactions">
          ${reactionHTML}
          <button class="plus" onclick="openPicker(event,'${id}')">+</button>
        </div>
      </div>
    `;

    chat.appendChild(div);
  });
});

/* TOGGLE REACTION */
window.toggle = async function(id, emoji) {
  const r = ref(db, "messages/" + id);
  const s = await get(r);
  let d = s.val();

  if (!d) return;
  if (!d.reactions) d.reactions = {};

  let arr = d.reactions[emoji] || [];

  if (arr.includes(myId)) {
    arr = arr.filter(x => x !== myId);
  } else {
    arr.push(myId);
  }

  if (arr.length === 0) delete d.reactions[emoji];
  else d.reactions[emoji] = arr;

  update(r, { reactions: d.reactions });
};

/* REACTION PICKER */
const picker = document.getElementById("picker");
let currentMsg = null;

window.openPicker = function (e, id) {
  e.stopPropagation();
  currentMsg = id;

  picker.style.display = "flex";
  picker.innerHTML = "";

  REACTIONS.forEach(r => {
    const s = document.createElement("span");
    s.className = "emoji";
    s.innerText = r;
    s.onclick = () => {
      picker.style.display = "none";
      toggle(currentMsg, r);
    };
    picker.appendChild(s);
  });
};

/* SETTINGS PANEL OPEN/CLOSE */
const settingsBtn = document.getElementById("settingsBtn");
const settingsPanel = document.getElementById("settingsPanel");
const avatarNameBtn = document.getElementById("avatarNameBtn");
const avatarList = document.getElementById("avatarList");

settingsBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  settingsPanel.classList.toggle("open");
  avatarList.classList.remove("open");
});

avatarNameBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  avatarList.classList.toggle("open");
});

/* CLOSE PICKER / SETTINGS ON OUTSIDE CLICK */
document.addEventListener("click", (e) => {
  if (!picker.contains(e.target)) {
    picker.style.display = "none";
  }
  if (!settingsPanel.contains(e.target) && e.target !== settingsBtn && !settingsBtn.contains(e.target)) {
    settingsPanel.classList.remove("open");
    avatarList.classList.remove("open");
  }
});
</script>

</body>
</html>
